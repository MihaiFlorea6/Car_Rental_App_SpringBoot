<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Register - Car Rental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .car-emoji {
            position: absolute;
            font-size: 40px;
            animation: drive 12s linear infinite;
            opacity: 0.3;
        }

        .car-emoji:nth-child(1) { bottom: 20%; animation-delay: 0s; }
        .car-emoji:nth-child(2) { bottom: 40%; animation-delay: 4s; }
        .car-emoji:nth-child(3) { bottom: 60%; animation-delay: 8s; }

        @keyframes drive {
            0% {
                left: -100px;
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                left: calc(100% + 100px);
                transform: scale(1);
            }
        }

        .register-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            animation: slideIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideIn {
            0% {
                transform: translateY(-100px) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 35px;
            font-size: 36px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
            font-size: 15px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            transition: all 0.3s;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        input:focus + .input-icon {
            transform: translateY(-50%) scale(1.2);
            color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out 0.4s backwards;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 500px;
            height: 500px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            animation: slideInDown 0.5s ease-out;
        }

        @keyframes slideInDown {
            0% { transform: translateY(-30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .alert-danger {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
            animation: fadeInUp 0.6s ease-out 0.5s backwards;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<!-- Animated Background -->
<div class="bg-animation">
    <div class="car-emoji">🚗</div>
    <div class="car-emoji">🚙</div>
    <div class="car-emoji">🚕</div>
</div>

<div class="register-container">
    <h2>🚗 Înregistrare Client</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label for="username">👤 Username *</label>
            <div class="input-wrapper">
                <input type="text" id="username" name="username" required placeholder="Alege un username">
                <span class="input-icon">👤</span>
            </div>
        </div>

        <div class="form-group">
            <label for="email">📧 Email *</label>
            <div class="input-wrapper">
                <input type="email" id="email" name="email" required placeholder="adresa@email.com">
                <span class="input-icon">📧</span>
            </div>
        </div>

        <div class="form-group">
            <label for="password">🔒 Parolă *</label>
            <div class="input-wrapper">
                <input type="password" id="password" name="password" required minlength="4" placeholder="Minim 4 caractere">
                <span class="input-icon">🔒</span>
            </div>
        </div>

        <button type="submit" class="btn">🚀 Creează Cont</button>
    </form>

    <div class="login-link">
        Ai deja cont? <a href="/login">Autentifică-te aici</a>
    </div>
</div>

<script>
    // Add animations to inputs
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.02)';
        });

        input.addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });
    });
</script>
</body>
</html>
